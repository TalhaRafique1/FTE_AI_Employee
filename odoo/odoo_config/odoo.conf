[options]
; This is the password that allows you to access the database manager
admin_passwd = odoo_secure_password_123

; Default language
lang = en_US

; Timezone
timezone = UTC

; Enable debug mode
; debug = True

; Log level
; log_level = debug

; Log file path
logfile = /var/log/odoo/odoo.log

; Data directory
data_dir = /var/lib/odoo

; Addons paths
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons

; Server-wide modules
server_wide_modules = web,base

; Maximum number of workers
workers = 2

; Maximum number of cron threads
max_cron_threads = 1

; Limit memory hard (in bytes)
; limit_memory_hard = 2684354560

; Limit memory soft (in bytes)
; limit_memory_soft = 2147483648

; Limit request time (in seconds)
; limit_request = 8192

; Limit time per request (in seconds)
; limit_time_cpu = 60

; Port
; http_port = 8069

; Interface
; http_interface = 0.0.0.0

; Database filters
; db_filter = ^postgres$

; Enable proxy mode (if behind reverse proxy)
; proxy_mode = True

; SSL configuration (if using HTTPS)
; ssl_enable = True
; ssl_certificate = /etc/ssl/odoo.crt
; ssl_private_key = /etc/ssl/odoo.key
